name: Build and push docker images

on:
  push:
    branches:
      - main
      - feature/*
      - bugfix/*
      - chore/*
      - security/*
    tags:
      - "v*"
  pull_request:
    branches:
      - main

env:
  DOCKER_CLI_EXPERIMENTAL: enabled
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        if: github.repository == 'lexiforest/curl-impersonate'
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Prepare docker metadata
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: |
          if [[ "${GITHUB_REF}" =~ ^refs/tags/v ]]; then
            echo "push_image=true" >> $GITHUB_ENV
            echo "image_tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          else
            echo "push_image=false" >> $GITHUB_ENV
            echo "image_tag=latest" >> $GITHUB_ENV
          fi

          if [[ "${GITHUB_REPOSITORY}" == "lexiforest/curl-impersonate" && -n "${DOCKER_USERNAME}" ]]; then
            echo "docker_image=${DOCKER_USERNAME}/curl-impersonate" >> $GITHUB_ENV
            echo "can_push_docker=true" >> $GITHUB_ENV
          else
            echo "docker_image=curl-impersonate" >> $GITHUB_ENV
            echo "can_push_docker=false" >> $GITHUB_ENV
          fi

      - name: Build debian docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/debian.dockerfile
          push: ${{ env.can_push_docker == 'true' && env.push_image == 'true' && 'true' || 'false' }}
          tags: |
            ${{ env.docker_image }}:${{ env.image_tag }}
            ${{ env.docker_image }}:latest

      - name: Build alpine docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/alpine.dockerfile
          push: ${{ env.can_push_docker == 'true' && env.push_image == 'true' && 'true' || 'false' }}
          tags: |
            ${{ env.docker_image }}:${{ env.image_tag }}-alpine
            ${{ env.docker_image }}:alpine
